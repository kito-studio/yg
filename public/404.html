<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 Not Found</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6efe6;
        --panel: #fffaf4;
        --text: #2b1a0c;
        --muted: #6e5a49;
        --line: #d8c7b6;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(
          circle at 20% 15%,
          #fff4d9 0%,
          var(--bg) 55%
        );
        color: var(--text);
        font-family: "Yu Gothic UI", "Hiragino Kaku Gothic ProN", sans-serif;
      }
      main {
        width: min(92vw, 560px);
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--panel);
        padding: 24px 20px;
        box-shadow: 0 10px 30px rgba(43, 26, 12, 0.12);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.35rem;
      }
      p {
        margin: 0 0 10px;
        color: var(--muted);
        line-height: 1.55;
      }
      a {
        color: #8a4b08;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>404 Not Found</h1>
      <p>指定されたページは見つかりませんでした。</p>
      <p><a href="/">トップへ戻る</a></p>
    </main>
  </body>
</html>
