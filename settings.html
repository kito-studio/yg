<!doctype html>
<!-- YG運用: Cloudflareビルド前提。変更はこのファイルとTSを直接更新する。 -->
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n-title="settings_title">YG 設定</title>
    <link rel="stylesheet" href="./css/settings.css" />
  </head>
  <body>
    <main class="settings-card">
      <h1 class="settings-title" data-i18n="settings_heading">設定</h1>

      <div class="settings-links">
        <a class="settings-link" href="./index.html" data-i18n="home">ホーム</a>
        <a
          class="settings-link"
          href="./db_maint.html"
          data-i18n="db_maint_title"
          >YG データメンテ</a
        >
      </div>

      <div class="settings-field">
        <label
          class="settings-label"
          for="langSelect"
          data-i18n="language_label"
          >言語設定</label
        >
        <select class="settings-select" id="langSelect">
          <option value="auto" data-i18n="language_auto">
            ブラウザ設定に合わせる
          </option>
          <option value="ja" data-i18n="language_ja">日本語</option>
          <option value="en" data-i18n="language_en">English</option>
        </select>
      </div>
    </main>

    <script type="module" src="./ts/settings.ts"></script>
  </body>
</html>
