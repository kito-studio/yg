<!doctype html>
<!-- YG開発正本: 変更はこのファイルで実施。公開時は yg/doc/ts_dev_publish_workflow.md に従って同期する。 -->
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n-title="settings_title">YG 設定</title>
    <style>
      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(
            circle at 18% 22%,
            rgba(255, 197, 93, 0.18),
            transparent 34%
          ),
          linear-gradient(160deg, #110905, #2a1b0d);
        color: #ffe7c0;
        font-family: "Segoe UI", "Yu Gothic UI", sans-serif;
      }

      .settings-card {
        width: min(92vw, 520px);
        background: linear-gradient(
          170deg,
          rgba(44, 28, 13, 0.95),
          rgba(21, 13, 7, 0.95)
        );
        border: 1px solid rgba(255, 212, 146, 0.25);
        border-radius: 18px;
        box-shadow:
          0 22px 40px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 rgba(255, 230, 184, 0.1);
        padding: 20px;
      }

      .settings-title {
        margin: 0 0 16px;
        font-size: 24px;
      }

      .settings-links {
        display: flex;
        gap: 10px;
        margin-bottom: 16px;
      }

      .settings-link {
        display: inline-block;
        color: #ffdca3;
        background: rgba(88, 56, 27, 0.7);
        border: 1px solid rgba(255, 216, 153, 0.28);
        border-radius: 10px;
        padding: 8px 12px;
        text-decoration: none;
      }

      .settings-field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .settings-label {
        font-size: 14px;
      }

      .settings-select {
        border: 1px solid rgba(255, 212, 146, 0.35);
        border-radius: 10px;
        background: rgba(31, 20, 11, 0.92);
        color: #ffefcf;
        font-size: 14px;
        padding: 8px 10px;
      }
    </style>
  </head>
  <body>
    <main class="settings-card">
      <h1 class="settings-title" data-i18n="settings_heading">設定</h1>

      <div class="settings-links">
        <a class="settings-link" href="./index_ts.html" data-i18n="home"
          >ホーム</a
        >
        <a
          class="settings-link"
          href="./db_maint.html"
          data-i18n="db_maint_title"
          >YG データメンテ</a
        >
      </div>

      <div class="settings-field">
        <label
          class="settings-label"
          for="langSelect"
          data-i18n="language_label"
          >言語設定</label
        >
        <select class="settings-select" id="langSelect">
          <option value="auto" data-i18n="language_auto">
            ブラウザ設定に合わせる
          </option>
          <option value="ja" data-i18n="language_ja">日本語</option>
          <option value="en" data-i18n="language_en">English</option>
        </select>
      </div>
    </main>

    <script type="module" src="./ts/settings.ts"></script>
  </body>
</html>
