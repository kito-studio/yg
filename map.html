<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n-title="map_page_title">マップ画面</title>
    <link rel="stylesheet" href="./css/page-common.css" />
  </head>
  <body>
    <div class="page-shell view-mode">
      <header class="page-header">
        <div class="page-header-left">
          <a
            class="page-btn"
            id="backToStageLink"
            href="./maps.html"
            data-i18n="back_to_stage"
            >ステージへ戻る</a
          >
          <h1 class="page-title" data-i18n="map_page_heading">マップ画面</h1>
        </div>
        <div class="page-header-right">
          <label class="mode-switch" data-i18n="mode_toggle_aria">
            <span data-i18n="edit_mode_label">編集</span>
            <input id="modeSwitch" type="checkbox" />
          </label>
          <button
            class="page-btn primary"
            id="addTaskBtn"
            type="button"
            data-i18n="add_task"
          >
            + タスク追加
          </button>
          <button
            class="page-btn"
            id="dbDownloadBtn"
            type="button"
            data-i18n="backup"
          >
            ⬇️ バックアップ
          </button>
          <button
            class="page-btn"
            id="dbUploadBtn"
            type="button"
            data-i18n="restore"
          >
            ⬆️ リストア
          </button>
          <button
            class="page-btn"
            id="dbMaintBtn"
            type="button"
            data-i18n="settings_aria"
          >
            ⚙
          </button>
          <input
            id="dbUploadInput"
            type="file"
            accept="application/json,.json"
            hidden
          />
        </div>
      </header>

      <main class="page-main">
        <section class="card">
          <h2 data-i18n="selected_map">選択マップ</h2>
          <div id="selectedMapBox"></div>
          <div class="actions" style="margin-top: 8px; display: flex; gap: 8px">
            <button
              class="page-btn"
              id="prevMapBtn"
              type="button"
              data-i18n="prev"
            >
              ◀ 前
            </button>
            <button
              class="page-btn"
              id="nextMapBtn"
              type="button"
              data-i18n="next"
            >
              次 ▶
            </button>
          </div>
        </section>

        <section class="card">
          <h2 data-i18n="task_list">タスク一覧</h2>
          <div class="object-list" id="taskList"></div>
        </section>
      </main>
    </div>

    <div class="dialog-backdrop" id="entityDialogBackdrop" hidden></div>
    <dialog class="entity-dialog" id="entityDialog">
      <form
        method="dialog"
        class="entity-dialog-shell"
        onsubmit="return false;"
      >
        <h2 id="entityDialogTitle">タスク編集</h2>
        <div class="entity-grid">
          <label for="entityNameInput" data-i18n="stage_name_label"
            >名称（nm）</label
          >
          <input id="entityNameInput" type="text" maxlength="80" />
          <label for="entityDescInput" data-i18n="stage_desc_label"
            >説明（desc）</label
          >
          <textarea id="entityDescInput"></textarea>
          <label for="entityProgressInput" data-i18n="stage_progress_label"
            >進捗</label
          >
          <input
            id="entityProgressInput"
            type="number"
            min="0"
            max="100"
            step="1"
          />
          <label for="entityStateInput" data-i18n="task_state">状態</label>
          <select id="entityStateInput">
            <option value="todo">todo</option>
            <option value="doing">doing</option>
            <option value="done">done</option>
            <option value="sealed">sealed</option>
          </select>
        </div>
        <div class="dialog-footer">
          <button
            class="page-btn"
            id="entityDialogCancel"
            type="button"
            data-i18n="cancel"
          >
            キャンセル
          </button>
          <button
            class="page-btn primary"
            id="entityDialogSave"
            type="button"
            data-i18n="save"
          >
            保存
          </button>
        </div>
      </form>
    </dialog>

    <script type="module" src="./ts/map-page.ts"></script>
  </body>
</html>
