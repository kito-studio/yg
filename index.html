<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2b1a0c" />
    <title>やること撃破！</title>
    <!-- Cloudflare Web Analytics -->
    <script
      defer
      src="https://static.cloudflareinsights.com/beacon.min.js"
      data-cf-beacon='{"token": "5502b91eb7db4a55a5504a7d5c143ce3"}'
    ></script>
    <!-- End Cloudflare Web Analytics -->
    <style>
      :root {
        --bg-1: #120a05;
        --bg-2: #2b1a0c;
        --logo: #ffdf8f;
        --shadow: rgba(0, 0, 0, 0.45);
        --ui-shadow: rgba(0, 0, 0, 0.28);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        position: relative;
        background:
          radial-gradient(
            circle at 20% 18%,
            rgba(255, 166, 58, 0.18),
            transparent 38%
          ),
          radial-gradient(
            circle at 82% 82%,
            rgba(255, 95, 46, 0.14),
            transparent 42%
          ),
          linear-gradient(160deg, var(--bg-1), var(--bg-2));
        overflow: hidden;
      }

      .stage-map {
        position: absolute;
        inset: 0;
        opacity: 0;
        pointer-events: none;
        transition: opacity 900ms ease;
      }

      body.map-visible .stage-map {
        opacity: 1;
      }

      .stage-map img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: saturate(1.08) contrast(1.02);
      }

      .logo-wrap {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        z-index: 10;
      }

      body.ready .logo-wrap {
        animation: logo-dock 1300ms cubic-bezier(0.25, 1, 0.35, 1) forwards;
      }

      .logo {
        display: block;
        width: min(74vw, 680px);
        min-width: 250px;
        height: auto;
        filter: drop-shadow(0 14px 24px var(--shadow));
        animation: float-in 780ms ease-out both;
        pointer-events: none;
        user-select: none;
      }

      .control-stack {
        position: absolute;
        left: 22px;
        top: 180px;
        z-index: 12;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
        opacity: 0;
        transform: translateY(8px);
        transition:
          opacity 280ms ease,
          transform 280ms ease;
      }

      body.ready .control-stack {
        opacity: 1;
        transform: translateY(0);
        transition-delay: 1320ms;
      }

      .mode-switch {
        position: relative;
        display: inline-flex;
        align-items: center;
      }

      .mode-switch-input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .mode-switch-track {
        width: 88px;
        height: 44px;
        border-radius: 999px;
        border: 2px solid rgba(255, 255, 255, 0.5);
        background: linear-gradient(
          180deg,
          rgba(32, 23, 12, 0.74),
          rgba(14, 9, 5, 0.84)
        );
        box-shadow: 0 8px 16px var(--ui-shadow);
        position: relative;
        cursor: pointer;
      }

      .mode-switch-thumb {
        position: absolute;
        top: 3px;
        left: 3px;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: linear-gradient(180deg, #fff2be, #ffc95e);
        box-shadow: 0 5px 10px rgba(0, 0, 0, 0.35);
        transition: transform 220ms ease;
      }

      .mode-switch-icon {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        font-size: 18px;
        opacity: 0.72;
        transition: opacity 220ms ease;
        user-select: none;
      }

      .mode-switch-icon.view {
        left: 12px;
      }

      .mode-switch-icon.edit {
        right: 12px;
      }

      .mode-switch-input:checked + .mode-switch-track .mode-switch-thumb {
        transform: translateX(44px);
      }

      .mode-switch-input:not(:checked)
        + .mode-switch-track
        .mode-switch-icon.view,
      .mode-switch-input:checked + .mode-switch-track .mode-switch-icon.edit {
        opacity: 1;
      }

      .add-stage-btn {
        width: 52px;
        height: 52px;
        border: 0;
        border-radius: 14px;
        font-size: 34px;
        line-height: 1;
        color: #2b1a0c;
        background: linear-gradient(180deg, #ffd778, #ffbb53);
        box-shadow: 0 8px 18px var(--ui-shadow);
        cursor: pointer;
        opacity: 0;
        transform: translateY(6px);
        transition:
          opacity 280ms ease,
          transform 280ms ease,
          filter 180ms ease;
      }

      body.ready.edit-mode .add-stage-btn {
        opacity: 1;
        transform: translateY(0);
      }

      body.ready:not(.edit-mode) .add-stage-btn {
        opacity: 0;
        transform: translateY(6px);
        pointer-events: none;
      }

      .add-stage-btn:hover {
        filter: brightness(1.05);
      }

      .add-stage-btn:active {
        transform: translateY(1px);
      }

      .stage-object {
        position: absolute;
        width: 74px;
        height: 74px;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.85);
        background: radial-gradient(
          circle at 32% 26%,
          #fff6cc 4%,
          #ffc96b 46%,
          #ee7f1d 100%
        );
        box-shadow:
          0 12px 20px rgba(0, 0, 0, 0.35),
          inset 0 0 0 2px rgba(255, 255, 255, 0.16);
        cursor: grab;
        touch-action: none;
        z-index: 8;
      }

      body.view-mode .stage-object {
        cursor: default;
      }

      .stage-object::before {
        content: attr(data-stage-label);
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        font-weight: 700;
        font-size: 13px;
        color: #3e1f06;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.55);
      }

      .stage-object.dragging {
        cursor: grabbing;
        box-shadow:
          0 15px 25px rgba(0, 0, 0, 0.42),
          inset 0 0 0 2px rgba(255, 255, 255, 0.18);
      }

      @keyframes float-in {
        from {
          opacity: 0;
          transform: translateY(16px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes logo-dock {
        from {
          left: 50%;
          top: 50%;
          transform: translate(-50%, -50%) scale(1);
        }
        to {
          left: 20px;
          top: 16px;
          transform: translate(0, 0) scale(0.42);
          transform-origin: top left;
        }
      }

      @media (max-width: 768px) {
        .control-stack {
          left: 12px;
          top: 82px;
          gap: 8px;
        }

        .mode-switch-track {
          width: 76px;
          height: 38px;
        }

        .mode-switch-thumb {
          width: 28px;
          height: 28px;
        }

        .mode-switch-icon {
          font-size: 16px;
        }

        .mode-switch-icon.view {
          left: 10px;
        }

        .mode-switch-icon.edit {
          right: 10px;
        }

        .mode-switch-input:checked + .mode-switch-track .mode-switch-thumb {
          transform: translateX(38px);
        }

        @keyframes logo-dock {
          from {
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(1);
          }
          to {
            left: 10px;
            top: 10px;
            transform: translate(0, 0) scale(0.34);
            transform-origin: top left;
          }
        }
      }
    </style>
  </head>
  <body>
    <div class="stage-map" id="stageMap" aria-hidden="true">
      <img src="./img/stage_map0.jpg" alt="ステージ選択地図" />
    </div>

    <div class="logo-wrap" id="logoWrap">
      <img class="logo" src="./img/yg_logo.jpg" alt="やること撃破！" />
    </div>

    <div class="control-stack" id="controlStack">
      <label class="mode-switch" aria-label="閲覧モードと編集モードの切り替え">
        <input class="mode-switch-input" id="modeSwitch" type="checkbox" />
        <span class="mode-switch-track" aria-hidden="true">
          <span class="mode-switch-icon view">👁</span>
          <span class="mode-switch-icon edit">✎</span>
          <span class="mode-switch-thumb"></span>
        </span>
      </label>
      <button
        class="add-stage-btn"
        id="addStageBtn"
        type="button"
        aria-label="ステージ追加"
      >
        +
      </button>
    </div>

    <script type="module" src="./js/init-db.js"></script>
    <script>
      (function () {
        const BODY_READY_CLASS = "ready";
        const ADD_BUTTON_ID = "addStageBtn";
        const LOGO_WRAP_ID = "logoWrap";
        const MODE_SWITCH_ID = "modeSwitch";

        const addBtn = document.getElementById(ADD_BUTTON_ID);
        const logoWrap = document.getElementById(LOGO_WRAP_ID);
        const modeSwitch = document.getElementById(MODE_SWITCH_ID);
        let stageCount = 0;

        document.body.classList.add("view-mode");

        setTimeout(() => {
          document.body.classList.add(BODY_READY_CLASS);
        }, 420);

        setTimeout(() => {
          document.body.classList.add("map-visible");
        }, 1800);

        if (!addBtn || !logoWrap || !(modeSwitch instanceof HTMLInputElement)) {
          return;
        }

        modeSwitch.checked = false;
        modeSwitch.addEventListener("change", () => {
          const editMode = modeSwitch.checked;
          document.body.classList.toggle("edit-mode", editMode);
          document.body.classList.toggle("view-mode", !editMode);
        });

        addBtn.addEventListener("click", () => {
          if (!document.body.classList.contains("edit-mode")) {
            return;
          }
          stageCount += 1;
          const stageObject = createStageObject(stageCount);
          document.body.append(stageObject);

          const rect = logoWrap.getBoundingClientRect();
          placeStageObject(stageObject, rect.left + 22, rect.bottom + 22);
          beginDrag(stageObject);
        });

        function createStageObject(index) {
          const el = document.createElement("button");
          el.type = "button";
          el.className = "stage-object";
          el.dataset.stageLabel = "ST" + index;
          el.setAttribute("aria-label", "ステージオブジェクト " + index);
          el.addEventListener("pointerdown", onPointerDown);
          return el;
        }

        function onPointerDown(event) {
          if (!document.body.classList.contains("edit-mode")) {
            return;
          }
          const target = event.currentTarget;
          if (!(target instanceof HTMLElement)) {
            return;
          }
          beginDrag(target, event);
        }

        function beginDrag(target, startEvent) {
          target.classList.add("dragging");

          const targetRect = target.getBoundingClientRect();
          const offsetX = startEvent
            ? startEvent.clientX - targetRect.left
            : targetRect.width / 2;
          const offsetY = startEvent
            ? startEvent.clientY - targetRect.top
            : targetRect.height / 2;

          const move = (clientX, clientY) => {
            placeStageObject(target, clientX - offsetX, clientY - offsetY);
          };

          const stopDragging = () => {
            target.classList.remove("dragging");
            window.removeEventListener("pointermove", onMove);
            window.removeEventListener("pointerup", onUp);
            window.removeEventListener("pointercancel", onUp);
          };

          const onMove = (event) => {
            move(event.clientX, event.clientY);
          };

          const onUp = () => {
            stopDragging();
          };

          if (startEvent && startEvent.pointerId != null) {
            target.setPointerCapture(startEvent.pointerId);
            move(startEvent.clientX, startEvent.clientY);
          }

          window.addEventListener("pointermove", onMove);
          window.addEventListener("pointerup", onUp);
          window.addEventListener("pointercancel", onUp);
        }

        function placeStageObject(target, left, top) {
          const maxLeft = window.innerWidth - target.offsetWidth;
          const maxTop = window.innerHeight - target.offsetHeight;
          target.style.left = Math.max(0, Math.min(left, maxLeft)) + "px";
          target.style.top = Math.max(0, Math.min(top, maxTop)) + "px";
        }
      })();
    </script>
  </body>
</html>
