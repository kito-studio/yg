<!doctype html>
<!-- YG正本: Cloudflareビルド前提。変更はこのファイルとTSを直接更新する。 -->
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2b1a0c" />
    <title data-i18n-title="app_title">やること撃破！</title>
    <!-- Cloudflare Web Analytics (skip on local development hosts) -->
    <script>
      (() => {
        const host = window.location.hostname;
        const isLocalHost =
          host === "localhost" ||
          host === "127.0.0.1" ||
          host === "::1" ||
          host.endsWith(".local");
        if (isLocalHost) {
          return;
        }
        const analyticsScript = document.createElement("script");
        analyticsScript.defer = true;
        analyticsScript.src =
          "https://static.cloudflareinsights.com/beacon.min.js";
        analyticsScript.setAttribute(
          "data-cf-beacon",
          '{"token": "a00658942d21445fae2c9aec4fd031d2"}',
        );
        document.head.appendChild(analyticsScript);
      })();
    </script>
    <!-- End Cloudflare Web Analytics -->
    <link rel="stylesheet" href="./css/index.css" />
  </head>
  <body>
    <header class="top-page-header">
      <span class="top-page-header-label" data-i18n="selected_world_label"
        >選択世界</span
      >
      <strong class="top-page-header-value" id="selectedWorldName">-</strong>
    </header>

    <div class="stage-map" id="stageMap" aria-hidden="true">
      <div class="stage-map-content" id="stageMapContent">
        <img
          class="stage-map-image"
          src="./img/world_map/fantasy1_e.jpg"
          alt="ステージ選択地図"
          data-i18n-alt="stage_map_alt"
          draggable="false"
        />
      </div>
    </div>

    <div id="info">
      <pre>
        このサイトは開発中です。m(_ _)m
        データ設計など試行錯誤中ですので、保存されたデータはスグ消えます。
      </pre>
    </div>

    <div class="logo-wrap" id="logoWrap">
      <img class="logo" src="./img/yg_logo.jpg" alt="やること撃破！" />
    </div>

    <div class="control-stack" id="controlStack">
      <label
        class="mode-switch"
        aria-label="閲覧モードと編集モードの切り替え"
        data-i18n-aria-label="mode_toggle_aria"
      >
        <input class="mode-switch-input" id="modeSwitch" type="checkbox" />
        <span class="mode-switch-track" aria-hidden="true">
          <span class="mode-switch-icon view">👁</span>
          <span class="mode-switch-icon edit">✎</span>
          <span class="mode-switch-thumb"></span>
        </span>
      </label>
      <button
        class="add-stage-btn"
        id="addStageBtn"
        type="button"
        aria-label="ステージ追加"
        data-i18n-aria-label="add_stage_aria"
      >
        +
      </button>
      <div class="db-io-row">
        <button
          class="db-io-btn"
          id="dbDownloadBtn"
          type="button"
          aria-label="データベース全体をダウンロード"
          data-i18n-aria-label="db_download_aria"
        >
          ⬇ DB
        </button>
        <button
          class="db-io-btn"
          id="dbUploadBtn"
          type="button"
          aria-label="データベースバックアップをアップロード"
          data-i18n-aria-label="db_upload_aria"
        >
          ⬆ DB
        </button>
        <button
          class="db-io-btn"
          id="dbMaintBtn"
          type="button"
          aria-label="データメンテ画面へ移動"
          data-i18n-aria-label="settings_aria"
        >
          ⚙
        </button>
        <button
          class="bgm-btn"
          id="bgmBtn"
          type="button"
          aria-label="BGM切り替え"
        >
          🔊
        </button>
      </div>
      <input
        id="dbUploadInput"
        type="file"
        accept="application/json,.json"
        hidden
      />
    </div>

    <div class="stage-dialog-backdrop" id="stageDialogBackdrop" hidden></div>

    <dialog class="stage-settings-dialog" id="stageSettingsDialog">
      <form method="dialog" class="stage-dialog-shell" onsubmit="return false;">
        <h2
          class="stage-dialog-title"
          id="stageDialogTitle"
          data-i18n="stage_settings_title"
        >
          ステージ設定
        </h2>
        <p class="stage-dialog-sub" data-i18n="stage_settings_sub">
          ステージの状態と基本情報を編集できます。
        </p>

        <div
          class="stage-dialog-tabs"
          role="tablist"
          aria-label="ステージ設定タブ"
        >
          <button
            class="stage-dialog-tab active"
            id="stageDialogTabBasic"
            type="button"
            role="tab"
            aria-selected="true"
            aria-controls="stageDialogPanelBasic"
            data-tab-target="stageDialogPanelBasic"
            data-i18n="stage_tab_basic"
          >
            基本
          </button>
          <button
            class="stage-dialog-tab"
            id="stageDialogTabImage"
            type="button"
            role="tab"
            aria-selected="false"
            aria-controls="stageDialogPanelImage"
            data-tab-target="stageDialogPanelImage"
            data-i18n="stage_tab_image"
          >
            画像
          </button>
        </div>

        <div class="stage-dialog-body">
          <section
            class="stage-dialog-panel active"
            id="stageDialogPanelBasic"
            role="tabpanel"
            aria-labelledby="stageDialogTabBasic"
          >
            <div class="stage-field">
              <label for="stageProgressRange" data-i18n="stage_progress_label"
                >撃破状態（進捗）</label
              >
              <div class="hp-gauge" aria-hidden="true">
                <div class="hp-gauge-fill" id="stageProgressBarFill"></div>
              </div>
              <div class="hp-meta">
                <span data-i18n="hp_label">HP</span>
                <span class="hp-value" id="stageProgressValue">100%</span>
              </div>
              <input
                class="stage-progress-range"
                id="stageProgressRange"
                type="range"
                min="0"
                max="100"
                step="1"
                value="100"
              />
            </div>

            <div class="stage-field">
              <label for="stageNameInput" data-i18n="stage_name_label"
                >名称（nm）</label
              >
              <input id="stageNameInput" type="text" maxlength="40" />
            </div>

            <div class="stage-field">
              <label for="stageColorInput" data-i18n="stage_color_label"
                >基本色</label
              >
              <input id="stageColorInput" type="color" value="#ffc96b" />
            </div>

            <div class="stage-field">
              <label for="stageDescInput" data-i18n="stage_desc_label"
                >説明（desc）</label
              >
              <textarea id="stageDescInput"></textarea>
            </div>
          </section>

          <section
            class="stage-dialog-panel"
            id="stageDialogPanelImage"
            role="tabpanel"
            aria-labelledby="stageDialogTabImage"
          >
            <div class="stage-field stage-image-group">
              <label for="stageImageFileInput" data-i18n="stage_image_label"
                >ステージ画像</label
              >
              <input id="stageImageFileInput" type="file" accept="image/*" />
              <p class="stage-image-current">
                <span data-i18n="current_file_label">現在</span>
                <span id="stageImageCurrent">-</span>
              </p>
              <div class="stage-image-actions">
                <button
                  class="stage-dialog-btn"
                  id="stageImagePickBtn"
                  type="button"
                  data-i18n="pick_registered_image"
                >
                  登録済みから選択
                </button>
                <button
                  class="stage-dialog-btn cancel"
                  id="stageImageClearBtn"
                  type="button"
                  data-i18n="upload_cancel"
                >
                  キャンセル
                </button>
                <button
                  class="stage-dialog-btn save"
                  id="stageImageSaveBtn"
                  type="button"
                  data-i18n="upload_save"
                >
                  保存
                </button>
              </div>
            </div>

            <div class="stage-field stage-image-group">
              <label for="mapImageFileInput" data-i18n="map_image_label"
                >マップ画像</label
              >
              <input id="mapImageFileInput" type="file" accept="image/*" />
              <p class="stage-image-current">
                <span data-i18n="current_file_label">現在</span>
                <span id="mapImageCurrent">-</span>
              </p>
              <div class="stage-image-actions">
                <button
                  class="stage-dialog-btn"
                  id="mapImagePickBtn"
                  type="button"
                  data-i18n="pick_registered_image"
                >
                  登録済みから選択
                </button>
                <button
                  class="stage-dialog-btn cancel"
                  id="mapImageClearBtn"
                  type="button"
                  data-i18n="upload_cancel"
                >
                  キャンセル
                </button>
                <button
                  class="stage-dialog-btn save"
                  id="mapImageSaveBtn"
                  type="button"
                  data-i18n="upload_save"
                >
                  保存
                </button>
              </div>
            </div>
          </section>
        </div>

        <div class="stage-dialog-footer">
          <button
            class="stage-dialog-btn cancel"
            id="stageDialogCancel"
            type="button"
          >
            <span data-i18n="cancel">キャンセル</span>
          </button>
          <button
            class="stage-dialog-btn save"
            id="stageDialogSave"
            type="button"
          >
            <span data-i18n="save">保存</span>
          </button>
        </div>
      </form>
    </dialog>

    <script type="module" src="./ts/top-page.ts"></script>
  </body>
</html>
