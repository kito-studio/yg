<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2b1a0c" />
    <title>やること撃破！</title>
    <!-- Cloudflare Web Analytics -->
    <script
      defer
      src="https://static.cloudflareinsights.com/beacon.min.js"
      data-cf-beacon='{"token": "5502b91eb7db4a55a5504a7d5c143ce3"}'
    ></script>
    <!-- End Cloudflare Web Analytics -->
    <style>
      :root {
        --bg-1: #120a05;
        --bg-2: #2b1a0c;
        --logo: #ffdf8f;
        --shadow: rgba(0, 0, 0, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(
            circle at 20% 18%,
            rgba(255, 166, 58, 0.18),
            transparent 38%
          ),
          radial-gradient(
            circle at 82% 82%,
            rgba(255, 95, 46, 0.14),
            transparent 42%
          ),
          linear-gradient(160deg, var(--bg-1), var(--bg-2));
        overflow: hidden;
      }

      .logo {
        display: block;
        width: min(74vw, 680px);
        height: auto;
        filter: drop-shadow(0 14px 24px var(--shadow));
        animation: float-in 780ms ease-out both;
      }

      @keyframes float-in {
        from {
          opacity: 0;
          transform: translateY(16px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
    </style>
  </head>
  <body>
    <img class="logo" src="./img/yg_logo.jpg" alt="やること撃破！" />
    <script type="module" src="./js/init-db.js"></script>
  </body>
</html>
