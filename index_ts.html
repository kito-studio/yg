<!doctype html>
<!-- YG開発正本: 変更はこのファイルで実施。公開時は yg/doc/ts_dev_publish_workflow.md に従って index.html へ同期する。 -->
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2b1a0c" />
    <title data-i18n-title="app_title">やること撃破！</title>
    <!-- Cloudflare Web Analytics -->
    <script
      defer
      src="https://static.cloudflareinsights.com/beacon.min.js"
      data-cf-beacon='{"token": "5502b91eb7db4a55a5504a7d5c143ce3"}'
    ></script>
    <!-- End Cloudflare Web Analytics -->
    <style>
      :root {
        --bg-1: #120a05;
        --bg-2: #2b1a0c;
        --logo: #ffdf8f;
        --shadow: rgba(0, 0, 0, 0.45);
        --ui-shadow: rgba(0, 0, 0, 0.28);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        position: relative;
        background:
          radial-gradient(
            circle at 20% 18%,
            rgba(255, 166, 58, 0.18),
            transparent 38%
          ),
          radial-gradient(
            circle at 82% 82%,
            rgba(255, 95, 46, 0.14),
            transparent 42%
          ),
          linear-gradient(160deg, var(--bg-1), var(--bg-2));
        overflow: hidden;
      }

      .stage-map {
        position: absolute;
        inset: 0;
        opacity: 0;
        pointer-events: none;
        transition: opacity 900ms ease;
      }

      body.map-visible.view-mode .stage-map {
        opacity: 1;
      }

      body.map-visible.edit-mode .stage-map {
        opacity: 0.5;
      }

      .stage-map img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: saturate(1.08) contrast(1.02);
      }

      #info {
        position: absolute;
        left: 30%;
        top: 5%;
        padding: 20px;
        z-index: 11;
        background-color: lightpink;
        color: black;
        opacity: 0.9;
        border-radius: 30px;
      }

      .logo-wrap {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        z-index: 10;
      }

      body.ready .logo-wrap {
        animation: logo-dock 1300ms cubic-bezier(0.25, 1, 0.35, 1) forwards;
      }

      .logo {
        display: block;
        width: min(74vw, 680px);
        min-width: 250px;
        height: auto;
        filter: drop-shadow(0 14px 24px var(--shadow));
        animation: float-in 780ms ease-out both;
        pointer-events: none;
        user-select: none;
      }

      .control-stack {
        position: absolute;
        left: 22px;
        top: 180px;
        z-index: 12;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
        opacity: 0;
        transform: translateY(8px);
        transition:
          opacity 280ms ease,
          transform 280ms ease;
      }

      body.ready .control-stack {
        opacity: 1;
        transform: translateY(0);
        transition-delay: 1320ms;
      }

      .mode-switch {
        position: relative;
        display: inline-flex;
        align-items: center;
      }

      .mode-switch-input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .mode-switch-track {
        width: 88px;
        height: 44px;
        border-radius: 999px;
        border: 2px solid rgba(255, 255, 255, 0.5);
        background: linear-gradient(
          180deg,
          rgba(32, 23, 12, 0.74),
          rgba(14, 9, 5, 0.84)
        );
        box-shadow: 0 8px 16px var(--ui-shadow);
        position: relative;
        cursor: pointer;
      }

      .mode-switch-thumb {
        position: absolute;
        top: 3px;
        left: 3px;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: linear-gradient(180deg, #fff2be, #ffc95e);
        box-shadow: 0 5px 10px rgba(0, 0, 0, 0.35);
        transition: transform 220ms ease;
      }

      .mode-switch-icon {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        font-size: 18px;
        color: lightgray;
        opacity: 0.72;
        transition: opacity 220ms ease;
        user-select: none;
      }

      .mode-switch-icon.view {
        left: 12px;
      }

      .mode-switch-icon.edit {
        right: 12px;
      }

      .mode-switch-input:checked + .mode-switch-track .mode-switch-thumb {
        transform: translateX(44px);
      }

      .mode-switch-input:not(:checked)
        + .mode-switch-track
        .mode-switch-icon.view,
      .mode-switch-input:checked + .mode-switch-track .mode-switch-icon.edit {
        opacity: 1;
      }

      .add-stage-btn {
        width: 52px;
        height: 52px;
        border: 0;
        border-radius: 14px;
        font-size: 34px;
        line-height: 1;
        color: #2b1a0c;
        background: linear-gradient(180deg, #ffd778, #ffbb53);
        box-shadow: 0 8px 18px var(--ui-shadow);
        cursor: pointer;
        opacity: 0;
        transform: translateY(6px);
        transition:
          opacity 280ms ease,
          transform 280ms ease,
          filter 180ms ease;
      }

      .db-io-row {
        display: flex;
        gap: 8px;
      }

      .db-io-btn {
        min-width: 72px;
        height: 34px;
        border: 0;
        border-radius: 10px;
        font-size: 12px;
        font-weight: 700;
        color: #ffefcf;
        background: linear-gradient(180deg, #5c3b1d, #3a2310);
        box-shadow: 0 6px 12px var(--ui-shadow);
        cursor: pointer;
      }

      .db-io-btn:hover {
        filter: brightness(1.08);
      }

      body.ready.edit-mode .add-stage-btn {
        opacity: 1;
        transform: translateY(0);
      }

      body.ready:not(.edit-mode) .add-stage-btn {
        opacity: 0;
        transform: translateY(6px);
        pointer-events: none;
      }

      .add-stage-btn:hover {
        filter: brightness(1.05);
      }

      .add-stage-btn:active {
        transform: translateY(1px);
      }

      .stage-object {
        position: absolute;
        width: 158px;
        height: 74px;
        border-radius: 20%;
        border: 3px solid rgba(255, 255, 255, 0.85);
        background: radial-gradient(
          circle at 32% 26%,
          #fff6cc 4%,
          var(--stage-base-color, #ffc96b) 46%,
          #7a4213 100%
        );
        box-shadow:
          0 12px 20px rgba(0, 0, 0, 0.35),
          inset 0 0 0 2px rgba(255, 255, 255, 0.16);
        cursor: grab;
        touch-action: none;
        overflow: visible;
        z-index: 8;
      }

      body.view-mode .stage-object {
        cursor: default;
      }

      .stage-object::before {
        content: attr(data-stage-label);
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        font-weight: 700;
        font-size: 13px;
        color: #3e1f06;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.55);
      }

      .stage-object.dragging {
        cursor: grabbing;
        box-shadow:
          0 15px 25px rgba(0, 0, 0, 0.42),
          inset 0 0 0 2px rgba(255, 255, 255, 0.18);
      }

      .stage-object-hp {
        position: absolute;
        left: 50%;
        top: calc(100% + 6px);
        transform: translateX(-50%);
        width: 76px;
        height: 11px;
        border-radius: 999px;
        background: rgba(21, 14, 8, 0.92);
        border: 1px solid rgba(255, 220, 162, 0.55);
        padding: 1px;
        pointer-events: none;
      }

      .stage-object-hp-fill {
        display: block;
        width: 100%;
        height: 100%;
        border-radius: 999px;
        background: #4dd26d;
        transition:
          width 180ms ease,
          background-color 180ms ease;
      }

      .stage-dialog-backdrop {
        position: fixed;
        inset: 0;
        background: radial-gradient(
          circle at 50% 42%,
          rgba(0, 0, 0, 0.35),
          rgba(0, 0, 0, 0.65)
        );
        z-index: 39;
      }

      .stage-settings-dialog {
        width: min(92vw, 540px);
        border: 1px solid rgba(255, 213, 142, 0.28);
        border-radius: 20px;
        padding: 0;
        background: linear-gradient(160deg, #2a180b, #120d08 72%);
        color: #ffe3b6;
        box-shadow:
          0 22px 42px rgba(0, 0, 0, 0.52),
          inset 0 1px 0 rgba(255, 222, 163, 0.12);
        z-index: 40;
      }

      .stage-settings-dialog::backdrop {
        background: transparent;
      }

      .stage-dialog-shell {
        padding: 20px 20px 16px;
      }

      .stage-dialog-title {
        margin: 0;
        font-size: 21px;
        letter-spacing: 0.02em;
      }

      .stage-dialog-sub {
        margin: 6px 0 0;
        font-size: 13px;
        color: rgba(255, 227, 182, 0.8);
      }

      .stage-dialog-body {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 16px;
      }

      .stage-field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .stage-field label {
        font-size: 13px;
        color: rgba(255, 227, 182, 0.86);
      }

      .stage-field input,
      .stage-field textarea {
        width: 100%;
        border: 1px solid rgba(255, 215, 146, 0.32);
        border-radius: 12px;
        background: rgba(24, 16, 10, 0.9);
        color: #fff3d9;
        padding: 10px 12px;
        font-size: 14px;
      }

      .stage-field textarea {
        min-height: 94px;
        resize: vertical;
      }

      .hp-gauge {
        border: 1px solid rgba(255, 215, 146, 0.34);
        border-radius: 999px;
        background: rgba(12, 8, 4, 0.9);
        padding: 3px;
      }

      .hp-gauge-fill {
        height: 16px;
        width: 100%;
        border-radius: 999px;
        background: #4dd26d;
        transition:
          width 180ms ease,
          background-color 180ms ease;
      }

      .hp-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 4px;
        font-size: 12px;
      }

      .hp-value {
        font-weight: 700;
        color: #4dd26d;
      }

      .stage-progress-range {
        width: 100%;
      }

      .stage-dialog-footer {
        margin-top: 16px;
        display: flex;
        justify-content: flex-end;
        gap: 10px;
      }

      .stage-dialog-btn {
        border: 0;
        border-radius: 11px;
        font-size: 14px;
        font-weight: 700;
        padding: 9px 14px;
        cursor: pointer;
      }

      .stage-dialog-btn.cancel {
        color: #f4d9ab;
        background: rgba(102, 73, 43, 0.78);
      }

      .stage-dialog-btn.save {
        color: #2d1806;
        background: linear-gradient(180deg, #ffd889, #f4b752);
      }

      @keyframes float-in {
        from {
          opacity: 0;
          transform: translateY(16px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes logo-dock {
        from {
          left: 50%;
          top: 50%;
          transform: translate(-50%, -50%) scale(1);
        }
        to {
          left: 20px;
          top: 16px;
          transform: translate(0, 0) scale(0.42);
          transform-origin: top left;
        }
      }

      @media (max-width: 768px) {
        .control-stack {
          left: 12px;
          top: 82px;
          gap: 8px;
        }

        .mode-switch-track {
          width: 76px;
          height: 38px;
        }

        .mode-switch-thumb {
          width: 28px;
          height: 28px;
        }

        .mode-switch-icon {
          font-size: 16px;
        }

        .mode-switch-icon.view {
          left: 10px;
        }

        .mode-switch-icon.edit {
          right: 10px;
        }

        .mode-switch-input:checked + .mode-switch-track .mode-switch-thumb {
          transform: translateX(38px);
        }

        @keyframes logo-dock {
          from {
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(1);
          }
          to {
            left: 10px;
            top: 10px;
            transform: translate(0, 0) scale(0.34);
            transform-origin: top left;
          }
        }
      }
    </style>
  </head>
  <body>
    <div class="stage-map" id="stageMap" aria-hidden="true">
      <img
        src="./img/world_map/world_map0.jpg"
        alt="ステージ選択地図"
        data-i18n-alt="stage_map_alt"
      />
    </div>

    <div id="info">
      <pre>
        このサイトは開発中です。m(_ _)m
        データ設計など試行錯誤中ですので、保存されたデータはスグ消えます。
      </pre>
    </div>

    <div class="logo-wrap" id="logoWrap">
      <img class="logo" src="./img/yg_logo.jpg" alt="やること撃破！" />
    </div>

    <div class="control-stack" id="controlStack">
      <label
        class="mode-switch"
        aria-label="閲覧モードと編集モードの切り替え"
        data-i18n-aria-label="mode_toggle_aria"
      >
        <input class="mode-switch-input" id="modeSwitch" type="checkbox" />
        <span class="mode-switch-track" aria-hidden="true">
          <span class="mode-switch-icon view">👁</span>
          <span class="mode-switch-icon edit">✎</span>
          <span class="mode-switch-thumb"></span>
        </span>
      </label>
      <button
        class="add-stage-btn"
        id="addStageBtn"
        type="button"
        aria-label="ステージ追加"
        data-i18n-aria-label="add_stage_aria"
      >
        +
      </button>
      <div class="db-io-row">
        <button
          class="db-io-btn"
          id="dbDownloadBtn"
          type="button"
          aria-label="データベース全体をダウンロード"
          data-i18n-aria-label="db_download_aria"
        >
          ⬇ DB
        </button>
        <button
          class="db-io-btn"
          id="dbUploadBtn"
          type="button"
          aria-label="データベースバックアップをアップロード"
          data-i18n-aria-label="db_upload_aria"
        >
          ⬆ DB
        </button>
        <button
          class="db-io-btn"
          id="dbMaintBtn"
          type="button"
          aria-label="データメンテ画面へ移動"
          data-i18n-aria-label="db_maint_aria"
        >
          ⚙
        </button>
      </div>
      <input
        id="dbUploadInput"
        type="file"
        accept="application/json,.json"
        hidden
      />
    </div>

    <div class="stage-dialog-backdrop" id="stageDialogBackdrop" hidden></div>

    <dialog class="stage-settings-dialog" id="stageSettingsDialog">
      <form method="dialog" class="stage-dialog-shell" onsubmit="return false;">
        <h2
          class="stage-dialog-title"
          id="stageDialogTitle"
          data-i18n="stage_settings_title"
        >
          ステージ設定
        </h2>
        <p class="stage-dialog-sub" data-i18n="stage_settings_sub">
          ステージの状態と基本情報を編集できます。
        </p>

        <div class="stage-dialog-body">
          <div class="stage-field">
            <label for="stageProgressRange" data-i18n="stage_progress_label"
              >撃破状態（進捗）</label
            >
            <div class="hp-gauge" aria-hidden="true">
              <div class="hp-gauge-fill" id="stageProgressBarFill"></div>
            </div>
            <div class="hp-meta">
              <span data-i18n="hp_label">HP</span>
              <span class="hp-value" id="stageProgressValue">100%</span>
            </div>
            <input
              class="stage-progress-range"
              id="stageProgressRange"
              type="range"
              min="0"
              max="100"
              step="1"
              value="100"
            />
          </div>

          <div class="stage-field">
            <label for="stageNameInput" data-i18n="stage_name_label"
              >名称（nm）</label
            >
            <input id="stageNameInput" type="text" maxlength="40" />
          </div>

          <div class="stage-field">
            <label for="stageColorInput" data-i18n="stage_color_label"
              >基本色</label
            >
            <input id="stageColorInput" type="color" value="#ffc96b" />
          </div>

          <div class="stage-field">
            <label for="stageDescInput" data-i18n="stage_desc_label"
              >説明（desc）</label
            >
            <textarea id="stageDescInput"></textarea>
          </div>
        </div>

        <div class="stage-dialog-footer">
          <button
            class="stage-dialog-btn cancel"
            id="stageDialogCancel"
            type="button"
          >
            <span data-i18n="cancel">キャンセル</span>
          </button>
          <button
            class="stage-dialog-btn save"
            id="stageDialogSave"
            type="button"
          >
            <span data-i18n="save">保存</span>
          </button>
        </div>
      </form>
    </dialog>

    <script type="module" src="./ts/top-page.ts"></script>
  </body>
</html>
