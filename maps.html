<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n-title="stage_page_title">ステージ画面</title>
    <link rel="stylesheet" href="./css/page-common.css" />
    <link rel="stylesheet" href="./css/maps.css" />
  </head>
  <body>
    <div class="maps-stage-bg" aria-hidden="true">
      <img id="stageMapImage" src="./img/world_map/world_map0.jpg" alt="" />
    </div>

    <div class="page-shell view-mode">
      <header class="page-header">
        <div class="page-header-left">
          <a class="page-btn" href="./index.html" data-i18n="back_to_top"
            >トップへ戻る</a
          >
          <h1 class="page-title" data-i18n="stage_page_heading">
            ステージ画面
          </h1>
          <span class="page-selected-pill" id="selectedStageHeaderName">-</span>
          <button
            class="page-btn"
            id="prevStageBtn"
            type="button"
            data-i18n="prev"
          >
            ◀ 前
          </button>
          <button
            class="page-btn"
            id="nextStageBtn"
            type="button"
            data-i18n="next"
          >
            次 ▶
          </button>
        </div>
        <div class="page-header-right"></div>
      </header>

      <div class="page-controls-row maps-controls-row">
        <button
          class="page-btn primary"
          id="addMapBtn"
          type="button"
          data-i18n="add_map"
        >
          +
        </button>
        <label class="mode-switch" data-i18n="mode_toggle_aria">
          <input class="mode-switch-input" id="modeSwitch" type="checkbox" />
          <span class="mode-switch-track" aria-hidden="true">
            <span class="mode-switch-icon view">●</span>
            <span class="mode-switch-icon edit">○</span>
            <span class="mode-switch-thumb"></span>
          </span>
        </label>
        <button
          class="page-btn"
          id="dbMaintBtn"
          type="button"
          data-i18n="settings_aria"
        >
          ⚙
        </button>
      </div>

      <main class="page-main">
        <section class="card">
          <h2 data-i18n="map_list">マップ一覧</h2>
          <div class="object-list" id="mapList"></div>
        </section>
      </main>
    </div>

    <div class="dialog-backdrop" id="entityDialogBackdrop" hidden></div>
    <dialog class="entity-dialog" id="entityDialog">
      <form
        method="dialog"
        class="entity-dialog-shell"
        onsubmit="return false;"
      >
        <h2 id="entityDialogTitle">マップ編集</h2>
        <div class="entity-grid">
          <label for="entityNameInput" data-i18n="stage_name_label"
            >名称（nm）</label
          >
          <input id="entityNameInput" type="text" maxlength="80" />
          <label for="entityDescInput" data-i18n="stage_desc_label"
            >説明（desc）</label
          >
          <textarea id="entityDescInput"></textarea>
          <label for="entityProgressInput" data-i18n="stage_progress_label"
            >進捗</label
          >
          <input
            id="entityProgressInput"
            type="number"
            min="0"
            max="100"
            step="1"
          />
        </div>
        <div class="dialog-footer">
          <button
            class="page-btn"
            id="entityDialogCancel"
            type="button"
            data-i18n="cancel"
          >
            キャンセル
          </button>
          <button
            class="page-btn primary"
            id="entityDialogSave"
            type="button"
            data-i18n="save"
          >
            保存
          </button>
        </div>
      </form>
    </dialog>

    <script type="module" src="./ts/stage-page.ts"></script>
  </body>
</html>
